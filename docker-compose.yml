services:
  database:
    image: mysql:8.0
    container_name: skillup_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: skillup_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "devuser", "-pdevpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_USER: devuser
      DB_PASSWORD: devpassword
      DB_NAME: skillup_db
    ports:
      - "3000:3000"

  frontend:
    build: ./client
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  db_data:
